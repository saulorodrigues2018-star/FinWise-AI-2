services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: finwise
      POSTGRES_USER: finwise
      POSTGRES_PASSWORD: finwise123
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: finwise-api:latest
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finwise
      SPRING_DATASOURCE_USERNAME: finwise
      SPRING_DATASOURCE_PASSWORD: finwise123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: '6379'
    # Allow the jar built by the Docker build stage; no source volume mounting in production compose.
    command: ["java", "-jar", "app.jar"]

volumes:
  postgres-data:
